
<style>

  .inner { position: relative; z-index: 1; }

  .title {

  }
  .subtitle {
    text-align: center;

  }

  .prog-wrap {
    background: rgba(0,0,0,0.55);

  }
  .prog-label { font-size: 6px; color: #f4f0e6; min-width: 58px; letter-spacing: 1px; }

  /* Question card — white/eggshell with green border */
  .card {
    background: #f4f0e6;

  .q-step { font-size: 6px; color: #2a6655; margin-bottom: 8px; letter-spacing: 1px; }

  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

  .opts.col3 { grid-template-columns: 1fr 1fr 1fr; }

  .opt {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    background: #013332;
    color: #f4f0e6;

    line-height: 1.8;
  }

  .navrow { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  .blink { animation: bl 1s steps(1) infinite; }

  /* Result cards also eggshell */
  .res-card {
    background: #f4f0e6;

    box-shadow: 5px 5px 0 rgba(0,0,0,0.5);

  }
  .res-rank { font-size: 6px; color: #2a6655; margin-bottom: 5px; display: flex; justify-content: space-between; }
  .res-name { font-size: 9px; color: #013332; margin-bottom: 9px; line-height: 1.7; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
  .tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;

    border: 2px solid;
  }

  .spec-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 11px; }
  .spec-pill {

  }

  .buy {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    padding: 7px 9px;
    border: 2px solid;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .buy.az { background: #ff9900; color: #1a0800; border-color: #c47700; }
  .buy.az:hover { background: #ffb733; }
  .buy.te { background: #013332; color: #f4f0e6; border-color: #013332; }
  .buy.te:hover { background: #025048; }
  .buy.tw { background: #6dbf7e; color: #013332; border-color: #013332; }
  .buy.tw:hover { background: #50ab66; }

  .score-b { font-size: 5px; color: #f4f0e6; background: #013332; padding: 3px 7px; border: 2px solid #013332; }

  .restart {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 11px 18px;
    background: #f4f0e6;

    border: 3px solid #f4f0e6;

<div class="app" id="app">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;">Tennis racket expert fitting quiz</h2>
  <div class="inner">
    <div class="icon">🎾</div>
    <div class="title">RACKET FINDER</div>
    <div class="subtitle">▶ EXPERT FITTING QUIZ ◀</div>
    <div class="prog-wrap">
      <span class="prog-label">PROGRESS</span>
      <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <span class="prog-num" id="pn">0 / 8</span>
    </div>
    <div id="qa"></div>
  </div>
</div>

<script>
const Qs = [
  {
    id:'ntrp', step:'// Q1 — SKILL LEVEL',
    text:'What is your NTRP rating (or closest description)?',
    hint:'💡 NTRP is the standard tennis rating scale. 2.5 = rally & learn, 3.5 = solid strokes, 4.5 = competitive club, 5.0+ = tournament level.',
    cols:2,
    opts:[
      {v:'25', l:'2.0 – 2.5\nLearning basics,\nconsistency is the\nmain goal'},
      {v:'30', l:'3.0 – 3.5\nSolid rallies, working\non spin & placement'},
      {v:'40', l:'4.0 – 4.5\nConsistent & tactical,\ncompetes regularly'},
      {v:'50', l:'5.0+\nHigh-level club or\ntournament player'}
    ]
  },
  {
    id:'shots', step:'// Q2 — STROKE PRODUCTION',
    text:'How do you mainly generate power on groundstrokes?',
    hint:'💡 This tells us whether you need the racket to add power for you, or if you generate your own and need control.',
    cols:2,
    opts:[
      {v:'arm', l:'🤜 ARM & WRIST\nShort compact swing,\nrelying on the racket\nfor pop'},
      {v:'body', l:'🔄 BODY ROTATION\nFull shoulder turn,\nswing drives\nthrough the ball'},
      {v:'heavy', l:'💥 HEAVY TOPSPIN\nBrushing up, high\nfollow-through,\nNadal style'},
      {v:'flat', l:'⚡ FLAT & HARD\nDriving through,\nminimal spin,\nDel Potro style'}
    ]
  },
  {
    id:'weakness', step:'// Q3 — BIGGEST COMPLAINT',
    text:'What is your biggest issue with your current game or racket?',
    hint:'💡 Your honest weak point is the single most useful signal for choosing the right frame spec.',
    cols:2,
    opts:[
      {v:'nopower', l:'😤 NOT ENOUGH POWER\nBall lands short,\nhard to hit through\nthe court'},
      {v:'nocontrol', l:'😬 SHOTS GOING LONG\nToo much power,\nhitting past the\nbaseline often'},
      {v:'nospin', l:'🌀 LACK OF SPIN\nCan\'t keep heavy\ntopspin in court\nor get slice to bite'},
      {v:'arm', l:'💢 ARM / ELBOW PAIN\nVibration or stiffness\ncauses discomfort\nafter play'}
    ]
  },
  {
    id:'grip', step:'// Q4 — GRIP SIZE',
    text:'What grip size do you use, or how does your hand measure?',
    hint:'💡 Measure from the middle crease of your palm to the tip of your ring finger. Too small = over-gripping. Too big = less wrist snap.',
    cols:2,
    opts:[
      {v:'g1', l:'GRIP 1 – 2\n(4 – 4¼ inch)\nSmaller hands,\njuniors or women'},
      {v:'g2', l:'GRIP 3\n(4⅜ inch)\nMost common size\nfor adults'},
      {v:'g3', l:'GRIP 4\n(4½ inch)\nLarger hands,\nmost men'},
      {v:'g4', l:'NOT SURE\nI\'ll add an overgrip\nand go smaller'}
    ]
  },
  {
    id:'headsize', step:'// Q5 — SWEET SPOT PREFERENCE',
    text:'When you mishit, what do you want the racket to do?',
    hint:'💡 Head size is the #1 spec that determines forgiveness. Larger = more forgiving. Smaller = more precise but punishes mishits.',
    cols:2,
    opts:[
      {v:'oversized', l:'🟢 FORGIVE ME\nI want a big sweet\nspot — mishits\nstill go in'},
      {v:'mid_plus', l:'🟡 BALANCED\nSome forgiveness\nbut I can handle\nprecision (98–102 sq in)'},
      {v:'mid', l:'🔴 PRECISE\nI hit the center\nconsistently. Want\nfull control (93–97 sq in)'},
      {v:'notsure', l:'❓ NOT SURE\nHelp me decide\nbased on my\nother answers'}
    ]
  },
  {
    id:'weight', step:'// Q6 — RACKET WEIGHT FEEL',
    text:'How do you feel about your current or past racket\'s weight?',
    hint:'💡 Heavier rackets (300g+) give stability and plow-through. Lighter rackets are easier to swing and kinder to the arm.',
    cols:2,
    opts:[
      {v:'light', l:'🪶 TOO HEAVY\nI want something\nlighter & faster\nto swing'},
      {v:'fine', l:'✅ FEELS RIGHT\nCurrent weight\nfeels natural\nand comfortable'},
      {v:'heavy', l:'🏋️ TOO LIGHT\nI want more mass\nfor stability on\nhard-hit balls'},
      {v:'first', l:'🆕 FIRST RACKET\nI have no reference\n— guide me'}
    ]
  },
  {
    id:'pattern', step:'// Q7 — STRING PATTERN',
    text:'What matters more: spin potential or string durability?',
    hint:'💡 Open patterns (16×19) = more spin & power but strings break faster. Dense (18×20) = control & durability.',
    cols:2,
    opts:[
      {v:'open', l:'🌀 MAX SPIN\nI want heavy\ntopspin, open\n16×19 pattern'},
      {v:'dense', l:'🎯 CONTROL\nI prefer precision,\ndense 18×20\nlasts longer'},
      {v:'either', l:'🤷 EITHER\nI\'m not particular\nabout string pattern\nyet'}
    ]
  },
  {
    id:'budget', step:'// Q8 — BUDGET',
    text:'What is your budget for a new racket?',
    hint:'💡 Higher budget opens up pro-level frames with advanced graphite layup. Mid-range still gets you excellent performance.',
    cols:2,
    opts:[
      {v:'low', l:'💰 UNDER $80\nBest value picks,\ngreat for\nbeginners'},
      {v:'mid', l:'💳 $80 – $160\nSolid mid-range\nframes for all\nlevels'},
      {v:'high', l:'💎 $160+\nPremium pro-level\nframes with top\ntechnology'}
    ]
  }
];

const rackets = [
  {
    name:'Wilson Clash 100',
    specs:['100 sq in','295g','16×19','Flex RA 55'],
    tags:[{l:'arm-friendly',c:'g'},{l:'control',c:'b'},{l:'all-levels',c:'b'}],
    desc:'Exceptionally flexible frame (RA 55) that kills vibration — the go-to prescription for tennis elbow. Large 100 sq in head with a 16×19 open pattern gives forgiveness and spin without punishing stiff contact.',
    score: a=>(a.weakness==='arm'?4:0)+(a.headsize==='mid_plus'||a.headsize==='notsure'?2:0)+(a.pattern==='open'||a.pattern==='either'?2:0)+(a.shots==='arm'||a.shots==='body'?1:0)+(a.weight==='fine'||a.weight==='first'?1:0),
    az:'https://www.amazon.com/s?k=Wilson+Clash+100',te:'https://www.tennisexpress.com/wilson-clash-100',tw:'https://www.tennis-warehouse.com/Wilson_Clash_100/p/WILC100.html'
  },
  {
    name:'Babolat Pure Drive 2024',
    specs:['100 sq in','300g','16×19','Stiff RA 71'],
    tags:[{l:'power',c:'a'},{l:'16×19 open',c:'g'},{l:'intermediate+',c:'b'}],
    desc:'The benchmark power racket. Stiff frame (RA 71) + 16×19 open pattern launches balls deep with minimal effort. Best for players with consistent mechanics who want effortless depth and pace from the baseline.',
    score: a=>(a.weakness==='nopower'?4:0)+(a.shots==='flat'||a.shots==='arm'?2:0)+(a.pattern==='open'||a.pattern==='either'?2:0)+(a.headsize==='mid_plus'||a.headsize==='oversized'||a.headsize==='notsure'?1:0)+(a.ntrp==='30'||a.ntrp==='40'?1:0),
    az:'https://www.amazon.com/s?k=Babolat+Pure+Drive+2024',te:'https://www.tennisexpress.com/babolat-pure-drive',tw:'https://www.tennis-warehouse.com/Babolat_Pure_Drive/p/BAPD.html'
  },
  {
    name:'Head Boom MP',
    specs:['100 sq in','300g','16×19','Mid flex RA 63'],
    tags:[{l:'spin',c:'a'},{l:'arm-friendly',c:'g'},{l:'all-court',c:'b'}],
    desc:'Mid-flex frame (RA 63) rewards full body-rotation swings with natural spin production and excellent feel. Great balance of power and arm comfort for players who swing through the ball with body rotation.',
    score: a=>(a.shots==='heavy'||a.shots==='body'?3:0)+(a.weakness==='nospin'?3:0)+(a.pattern==='open'||a.pattern==='either'?2:0)+(a.weakness==='arm'?2:0)+(a.ntrp==='30'||a.ntrp==='40'?1:0),
    az:'https://www.amazon.com/s?k=Head+Boom+MP',te:'https://www.tennisexpress.com/head-boom-mp',tw:'https://www.tennis-warehouse.com/HEAD_Boom_MP/p/HDBMPX.html'
  },
  {
    name:'Yonex VCORE 98',
    specs:['98 sq in','305g','16×19','Stiff RA 67'],
    tags:[{l:'topspin',c:'a'},{l:'advanced',c:'a'},{l:'baseliner',c:'b'}],
    desc:'The topspin machine. Isometric head shape enlarges the sweet spot while the aerodynamic frame aids swing speed. Open 16×19 pattern + stiff frame = explosive spin from the baseline for high-NTRP players.',
    score: a=>(a.weakness==='nospin'?4:0)+(a.shots==='heavy'?3:0)+(a.ntrp==='40'||a.ntrp==='50'?2:0)+(a.headsize==='mid_plus'||a.headsize==='notsure'?2:0)+(a.weight==='fine'||a.weight==='heavy'?1:0),
    az:'https://www.amazon.com/s?k=Yonex+VCORE+98',te:'https://www.tennisexpress.com/yonex-vcore-98',tw:'https://www.tennis-warehouse.com/Yonex_VCORE_98/p/YXVC98.html'
  },
  {
    name:'Wilson Pro Staff 97 v14',
    specs:['97 sq in','315g','18×20','Control RA 63'],
    tags:[{l:'18×20 dense',c:'g'},{l:'control',c:'b'},{l:'advanced',c:'a'}],
    desc:"Federer's DNA. Dense 18×20 pattern + 315g weight gives exceptional precision and stability on fast incoming balls. Rewards advanced players who generate their own pace and demand pinpoint control above all else.",
    score: a=>(a.weakness==='nocontrol'?4:0)+(a.pattern==='dense'?3:0)+(a.shots==='flat'||a.shots==='body'?2:0)+(a.ntrp==='40'||a.ntrp==='50'?2:0)+(a.weight==='heavy'||a.weight==='fine'?1:0)+(a.headsize==='mid'?2:0),
    az:'https://www.amazon.com/s?k=Wilson+Pro+Staff+97+v14',te:'https://www.tennisexpress.com/wilson-pro-staff-97',tw:'https://www.tennis-warehouse.com/Wilson_Pro_Staff_97_v14/p/WLPS97V14.html'
  },
  {
    name:'Head Speed MP 2024',
    specs:['100 sq in','295g','16×19','Mid-stiff RA 65'],
    tags:[{l:'spin',c:'a'},{l:'maneuverability',c:'g'},{l:'all-court',c:'b'}],
    desc:"Djokovic's lineage. Lightweight and fast through the air — ideal for players who rely on quick swing speed to generate spin. Great net game feel and exceptional maneuverability for all-court players.",
    score: a=>(a.shots==='heavy'?3:0)+(a.weakness==='nospin'?2:0)+(a.weight==='light'||a.weight==='first'?2:0)+(a.pattern==='open'||a.pattern==='either'?2:0)+(a.headsize==='mid_plus'||a.headsize==='notsure'?1:0)+(a.ntrp==='30'||a.ntrp==='40'?1:0),
    az:'https://www.amazon.com/s?k=Head+Speed+MP+2024',te:'https://www.tennisexpress.com/head-speed-mp',tw:'https://www.tennis-warehouse.com/HEAD_Speed_MP/p/HDSPDMP.html'
  },
  {
    name:'Tecnifibre TF-X1 300',
    specs:['102 sq in','300g','16×19','Flex RA 58'],
    tags:[{l:'beginner-friendly',c:'g'},{l:'arm-friendly',c:'g'},{l:'forgiving',c:'b'}],
    desc:'Oversized head (102 sq in) + low stiffness (RA 58) = maximum forgiveness and arm comfort. Designed for players still building consistency. Mishits still clear the net, and the arm barely feels a thing.',
    score: a=>(a.ntrp==='25'?4:0)+(a.weakness==='arm'?3:0)+(a.headsize==='oversized'||a.headsize==='notsure'?2:0)+(a.weight==='light'||a.weight==='first'?2:0)+(a.shots==='arm'?1:0),
    az:'https://www.amazon.com/s?k=Tecnifibre+TF-X1+300',te:'https://www.tennisexpress.com/tecnifibre-tf-x1',tw:'https://www.tennis-warehouse.com/Tecnifibre_TF-X1/p/TFTFX1.html'
  },
  {
    name:'Babolat Pure Aero 2023',
    specs:['100 sq in','300g','16×19','Stiff RA 70'],
    tags:[{l:'topspin',c:'a'},{l:'baseliner',c:'b'},{l:'aggressive',c:'a'}],
    desc:"Nadal's weapon. Aerodynamic woofer frame cuts through air resistance for faster swing speeds. Stiff beam + 16×19 launches heavy topspin deep. Built for baseliners who swing hard and want the ball to kick high.",
    score: a=>(a.shots==='heavy'?4:0)+(a.weakness==='nospin'?3:0)+(a.ntrp==='40'||a.ntrp==='50'?2:0)+(a.pattern==='open'?2:0)+(a.weight==='fine'||a.weight==='heavy'?1:0),
    az:'https://www.amazon.com/s?k=Babolat+Pure+Aero+2023',te:'https://www.tennisexpress.com/babolat-pure-aero',tw:'https://www.tennis-warehouse.com/Babolat_Pure_Aero/p/BAPA.html'
  }
];

let ans={}, cur=0;
function tagClass(c){ return c==='g'?'tag g':c==='a'?'tag a':'tag b'; }

function prog(){
  const p=Math.round(cur/Qs.length*100);
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('pn').textContent=cur+' / '+Qs.length;
}

function render(){
  const q=Qs[cur], sv=ans[q.id];
  const cls=q.cols===1?'col1':q.cols===3?'col3':'';
  const opts=q.opts.map(o=>`<button class="opt${sv===o.v?' sel':''}" onclick="pick('${q.id}','${o.v}',this)">${o.l.replace(/\n/g,'<br>')}</button>`).join('');
  document.getElementById('qa').innerHTML=`
    <div class="card">
      <div class="q-step">${q.step} <span class="blink">_</span></div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="opts ${cls}">${opts}</div>
      <div class="navrow">
        ${cur>0?'<button class="nbtn back" onclick="back()">◀ BACK</button>':''}
        <button class="nbtn next" id="nb" onclick="next()" ${sv?'':'disabled'}>${cur===Qs.length-1?'FINISH ▶':'NEXT ▶'}</button>
      </div>
    </div>`;
  prog();
}

function pick(id,v,btn){
  ans[id]=v;
  btn.closest('.opts').querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('nb').disabled=false;
}

function next(){ if(!ans[Qs[cur].id])return; cur<Qs.length-1?(cur++,render()):results(); }
function back(){ if(cur>0){cur--;render();} }

function results(){
  const a=ans;
  const top=rackets.map(r=>({...r,s:r.score(a)})).sort((x,y)=>y.s-x.s).slice(0,3);
  const medals=['🥇','🥈','🥉'],labels=['TOP PICK','RUNNER UP','ALSO GREAT'];
  const cards=top.map((r,i)=>`
    <div class="res-card">
      <div class="res-rank"><span>${medals[i]} ${labels[i]}</span><span class="score-b">FIT SCORE: ${r.s}</span></div>
      <div class="res-name">${r.name}</div>
      <div class="spec-row">${r.specs.map(s=>`<span class="spec-pill">${s}</span>`).join('')}</div>
      <div class="tags">${r.tags.map(t=>`<span class="${tagClass(t.c)}">${t.l}</span>`).join('')}</div>
      <div class="res-desc">${r.desc}</div>
      <div class="buy-row">
