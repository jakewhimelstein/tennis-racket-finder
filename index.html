<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Racket Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" id="app">
    <h1 class="sr-only">Tennis racket expert fitting quiz</h1>

    <div class="inner">
      <div class="pixel-logo" aria-hidden="true">
        <span class="pixel-logo-ball"></span>
      </div>
      <div class="title">RACKET FINDER</div>
      <div class="subtitle">&gt;&gt; EXPERT FITTING QUIZ &lt;&lt;</div>

      <div class="prog-wrap" aria-label="Quiz progress">
        <span class="prog-label">PROGRESS</span>
        <div class="prog-track">
          <div class="prog-fill" id="pf"></div>
        </div>
        <span class="prog-num" id="pn">0 / 8</span>
      </div>

      <section id="qa" aria-live="polite"></section>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
